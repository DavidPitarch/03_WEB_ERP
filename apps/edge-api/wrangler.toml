name = "gestion-siniestros"
main = "src/index.ts"
compatibility_date = "2024-06-01"

# ─── KV Namespace: rate limiting distribuido ─────────────────────────────────
# Crear con: wrangler kv:namespace create RATE_LIMIT_KV
# Sustituir PLACEHOLDER con el ID devuelto por el comando anterior.
# Sin este binding el Worker usa fallback in-memory (válido solo en dev).
#
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "PLACEHOLDER_KV_NAMESPACE_ID"

# ─── Variables de entorno ────────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"

# ─── Cron Triggers (watchdogs) — 7:00 y 13:00 UTC ───────────────────────────
[triggers]
crons = ["0 7 * * *", "0 13 * * *"]

# ─── Queue bindings ──────────────────────────────────────────────────────────
# Create queues first: wrangler queues create domain-events
#                      wrangler queues create domain-events-dlq
[[queues.producers]]
queue = "domain-events"
binding = "DOMAIN_EVENTS_QUEUE"

[[queues.consumers]]
queue = "domain-events"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "domain-events-dlq"

[[queues.consumers]]
queue = "domain-events-dlq"
max_batch_size = 5
max_batch_timeout = 30
max_retries = 0

# ─── Secrets (cargar con `wrangler secret put <NAME>`) ───────────────────────
# SUPABASE_URL               — URL del proyecto Supabase
# SUPABASE_ANON_KEY          — Clave anonima Supabase
# SUPABASE_SERVICE_ROLE_KEY  — Clave service role Supabase
# RESEND_API_KEY             — API key de Resend
# CONFIRM_BASE_URL           — URL base del frontend (https://gestion-siniestros.pages.dev)
# ALLOWED_ORIGINS            — Origenes CORS (comma-separated)
# VP_WEBHOOK_SECRET          — Secret HMAC para webhooks VP
#
# Deploy: wrangler deploy
# URL:    https://gestion-siniestros.david-pitarch.workers.dev
# Health: /health
